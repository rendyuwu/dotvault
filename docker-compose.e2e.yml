services:
  postgres-e2e:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env.e2e
    ports:
      - "127.0.0.1:55433:5432"
    volumes:
      - postgres_e2e_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_e2e_data:
